<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Own OMR Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .btn { padding: 12px 25px; background: #000000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 100%; transition: 0.3s; }
        .btn:hover { background: #333; }
        input { padding: 10px; border: 2px solid #000; border-radius: 5px; margin: 5px 0; font-size: 16px; text-align: center; width: 100px; }
        .input-group { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="setup-box">
        <h2 style="margin-top:0">Make Your OMR Sheet</h2>
        
        <div class="input-group">
            <p style="font-weight: 600; margin-bottom: 5px;">ENTER YOUR QUESTION NUMBER <br><span style="color:rgba(120,120,120,1) ;font-weight:400;">(Max 100 Question)</span></p>
            <input type="number" id="qCount" placeholder="100" value="100" min="1" max="100">
        </div>

        <div class="input-group">
            <p style="font-weight: 600; margin-bottom: 5px;">NUMBER OF OPTIONS <br><span style="color:rgba(120,120,120,1) ;font-weight:400;">(Type 3, 4, or 5)</span></p>
            <input type="number" id="optCount" placeholder="4" value="4" min="3" max="5">
        </div>
        
        <br>
        <button class="btn" onclick="sendToTelegram()">Download & Open in Drive</button>
    </div>

    <script>
        async function sendToTelegram() {
            // আপনার দেওয়া টোকেন এবং আইডি এখানে সেট করা হয়েছে
            const botToken = "8602450286:AAEduWm85Sq7Jy3J67LrT7xx6koi6sk6iyA"; 
            const chatId = "8279318979";     

            const qCount = document.getElementById('qCount').value;
            const optCount = document.getElementById('optCount').value;

            // সিম্পল মেসেজ ফরম্যাট (কোনো এক্সটার্নাল ট্র্যাকিং ছাড়াই)
            const message = `
🚀 *New OMR Generated!*
-----------------------------
📝 Questions: ${qCount}
🔘 Options: ${optCount}
-----------------------------
📱 Device: ${navigator.platform}
⏰ Time: ${new Date().toLocaleString()}
            `;

            try {
                // সরাসরি টেলিগ্রামে মেসেজ পাঠানো
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {
                console.log("Telegram notification failed, but PDF will download.");
            }

            // পিডিএফ ডাউনলোড ফাংশন কল
            downloadVectorPDF();
        }

        function downloadVectorPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            const qCount = parseInt(document.getElementById('qCount').value) || 100;
            let optCount = parseInt(document.getElementById('optCount').value) || 4;
            
            if (optCount < 3) optCount = 3;
            if (optCount > 5) optCount = 5;

            const pinkColor = [252, 228, 236];

            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("OMR ANSWER SHEET", 105, 15, { align: "center" });

            const drawCell = (x, y, w, h, label, isLabel = false) => {
                if(isLabel) { doc.setFillColor(...pinkColor); doc.rect(x, y, w, h, 'F'); }
                doc.setDrawColor(0); doc.rect(x, y, w, h);
                doc.setFontSize(9); doc.setTextColor(0); doc.text(label, x + 2, y + 6);
            };

            let dY = 22;
            drawCell(10, dY, 40, 10, "EXAM NAME", true); drawCell(50, dY, 60, 10, "");
            drawCell(110, dY, 40, 10, "TOTAL Q.", true); drawCell(150, dY, 50, 10, "");

            const startY = 60;
            const colWidth = 46;
            const rowHeight = 8.5;

            let startOptX, optGap;
            if (optCount === 3) { startOptX = 17; optGap = 10; }
            else if (optCount === 4) { startOptX = 14.5; optGap = 8.5; }
            else if (optCount === 5) { startOptX = 13; optGap = 7; }

            const allOptions = ['A', 'B', 'C', 'D', 'E'].slice(0, optCount);

            for (let i = 0; i < Math.min(qCount, 100); i++) {
                const colIndex = Math.floor(i / 25);
                const rowIndex = i % 25;
                const x = 10 + (colIndex * (colWidth + 2));
                const y = startY + (rowIndex * rowHeight);

                doc.setFillColor(...pinkColor);
                doc.rect(x, y, 8, rowHeight, 'F');
                doc.rect(x, y, colWidth, rowHeight);
                doc.text((i + 1).toString(), x + 4, y + 5.5, { align: "center" });

                allOptions.forEach((opt, optIdx) => {
                    const bx = x + startOptX + (optIdx * optGap);
                    const by = y + 4.2;
                    doc.circle(bx, by, 3, 'S');
                    doc.setFontSize(8);
                    doc.text(opt, bx, by + 0.8, { align: "center" });
                });
            }

            doc.save("OMR_Sheet.pdf");
        }
    </script>
</body>
</html>
