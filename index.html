<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>OMR শিট তৈরি করুন</h2>
        <input type="number" id="qCount" placeholder="মোট প্রশ্ন সংখ্যা (যেমন: ১০০)" min="1">
        <button onclick="saveAndGo()">ফাইনাল পেজ দেখুন</button>
    </div>
    <script>
        function saveAndGo() {
            const num = document.getElementById('qCount').value;
            if(num > 0) {
                localStorage.setItem('totalQ', num);
                window.location.href = 'final.html';
            }
        }
    </script>
</body>
</html>
