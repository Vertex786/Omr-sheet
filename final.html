<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native PDF OMR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .btn-download { background: #000; color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-download:hover { background: #333; }
        p { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>OMR শিট প্রস্তুত!</h2>
    <p>নিচের বাটনে ক্লিক করলে সরাসরি নেটিভ পিডিএফ ডাউনলোড হবে।</p>
    <button class="btn-download" onclick="generateNativePDF()">সরাসরি PDF ডাউনলোড করুন</button>
</div>

<script>
    function generateNativePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF(); // A4 সাইজ ডিফল্ট
        
        const totalQ = parseInt(localStorage.getItem('totalQ')) || 100;
        const rowsPerColumn = 25;
        
        // হেডার টাইটেল
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.text("OMR ANSWER SHEET", 105, 20, { align: "center" });
        
        // নাম ও রোলের ঘর (লাইন ড্রইং)
        doc.setFontSize(10);
        doc.text("NAME: __________________________________", 20, 35);
        doc.text("ROLL: _________________", 110, 35);
        doc.text("DATE: ___________", 170, 35);
        
        // ডিজাইন প্যারামিটার
        let startX = 15;
        let startY = 50;
        let rowHeight = 8;
        let colWidth = 47;
        let radius = 1.8;

        for (let i = 0; i < totalQ; i++) {
            // কলাম এবং রো ক্যালকুলেশন
            let colIndex = Math.floor(i / rowsPerColumn);
            let rowIndex = i % rowsPerColumn;
            
            let x = startX + (colIndex * colWidth);
            let y = startY + (rowIndex * rowHeight);

            // প্রশ্ন নাম্বার
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text(`${i + 1}.`, x, y);

            // ৪টি বৃত্ত (A, B, C, D) ড্র করা
            const options = ['A', 'B', 'C', 'D'];
            options.forEach((opt, idx) => {
                let circleX = x + 8 + (idx * 8.5);
                
                // বৃত্ত আঁকা (Vector circle - ফাটবে না)
                doc.setLineWidth(0.2);
                doc.circle(circleX, y - 1, radius, 'S');
                
                // বৃত্তের ভেতরে টেক্সট
                doc.setFontSize(6);
                doc.setFont("helvetica", "normal");
                doc.text(opt, circleX, y - 0.5, { align: "center" });
            });

            // প্রতি ২৫টি পর পর বক্স বর্ডার ড্র করা (ঐচ্ছিক)
            if (rowIndex === 0) {
                doc.setLineWidth(0.5);
                doc.rect(x - 2, startY - 6, colWidth - 5, (rowsPerColumn * rowHeight) + 2);
            }
        }

        // পিডিএফ সেভ করা
        doc.save("Official_OMR_Sheet.pdf");
    }
</script>

</body>
</html>
