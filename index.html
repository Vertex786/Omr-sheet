<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium OMR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #d81b60; /* Deep pink from image */
            --light-pink: #fce4ec; /* Light pink background */
            --border-color: #d81b60;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Input Section */
        .input-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .input-section h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 10px 15px;
            font-size: 16px;
            width: 150px;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ad144b;
        }

        /* Actions Section */
        .actions {
            display: none;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* OMR Preview Area */
        #omr-preview-container {
            display: none;
            background: white;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            width: 210mm; /* A4 Width */
            min-height: 297mm; /* A4 Height */
            box-sizing: border-box;
            margin: 0 auto;
        }

        /* OMR Grid Layout */
        .omr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .omr-column {
            border: 2px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        /* Column Header */
        .omr-header {
            display: flex;
            background-color: var(--light-pink);
            border-bottom: 2px solid var(--border-color);
            font-weight: bold;
            color: black;
            font-size: 14px;
        }

        .omr-header .h-q {
            width: 40px;
            text-align: center;
            padding: 8px 0;
            border-right: 2px solid var(--border-color);
        }

        .omr-header .h-a {
            flex-grow: 1;
            text-align: center;
            padding: 8px 0;
        }

        /* Individual Question Row */
        .omr-row {
            display: flex;
            border-bottom: 1px solid rgba(216, 27, 96, 0.3);
            align-items: center;
            background-color: white;
        }
        
        .omr-row:nth-child(even) {
            background-color: #fff9fb; /* Very subtle pink alternate row */
        }

        .omr-row:last-child {
            border-bottom: none;
        }

        .q-number {
            width: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border-right: 2px solid var(--border-color);
            padding: 6px 0;
        }

        .options {
            display: flex;
            flex-grow: 1;
            justify-content: space-evenly;
            padding: 6px 0;
        }

        /* OMR Bubbles */
        .bubble {
            width: 20px;
            height: 20px;
            border: 1px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* Print Settings to ensure vector graphics and exact layout */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .input-section, .actions { display: none !important; }
            #omr-preview-container { 
                box-shadow: none; 
                margin: 0; 
                padding: 0;
                width: 100%;
            }
            .omr-column { break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="input-section" id="inputSection">
        <h2>OMR Sheet Generator</h2>
        <p>কতগুলো প্রশ্নের OMR তৈরি করতে চান? (সর্বোচ্চ ১০০)</p>
        <input type="number" id="qCount" min="1" max="100" placeholder="omr">
        <button onclick="generateOMR()">Preview OMR</button>
    </div>

    <div class="actions" id="actionsSection">
        <button style="background: #333;" onclick="window.location.reload()">Back</button>
        <button onclick="window.print()">🖨️ Print (Best Vector Quality)</button>
        <button onclick="downloadPDF()">⬇️ Download PDF</button>
    </div>

    <div id="omr-preview-container">
        <div class="omr-grid" id="omrGrid">
            </div>
    </div>

    <script>
        function generateOMR() {
            const count = parseInt(document.getElementById('qCount').value);
            
            if(isNaN(count) || count < 1) {
                alert("দয়া করে সঠিক সংখ্যা ইনপুট দিন!");
                return;
            }
            
            const limit = Math.min(count, 100); // Max 100 questions (25 x 4 columns)
            const grid = document.getElementById('omrGrid');
            grid.innerHTML = ''; // Clear previous

            const maxPerCol = 25;
            const totalCols = Math.ceil(limit / maxPerCol);

            let currentQ = 1;

            for (let c = 0; c < totalCols; c++) {
                let colHTML = `
                <div class="omr-column">
                    <div class="omr-header">
                        <div class="h-q">প্রশ্ন</div>
                        <div class="h-a">উত্তর</div>
                    </div>
                `;

                for (let r = 0; r < maxPerCol; r++) {
                    if (currentQ > limit) break;
                    
                    colHTML += `
                    <div class="omr-row">
                        <div class="q-number">${currentQ}</div>
                        <div class="options">
                            <div class="bubble">A</div>
                            <div class="bubble">B</div>
                            <div class="bubble">C</div>
                            <div class="bubble">D</div>
                        </div>
                    </div>`;
                    currentQ++;
                }

                colHTML += `</div>`;
                grid.innerHTML += colHTML;
            }

            // Hide input, show preview and actions
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('actionsSection').style.display = 'flex';
            document.getElementById('omr-preview-container').style.display = 'block';
        }

        // Vector PDF Download logic
        function downloadPDF() {
            const element = document.getElementById('omr-preview-container');
            
            const opt = {
                margin:       10,
                filename:     'OMR_Sheet.pdf',
                image:        { type: 'jpeg', quality: 1 },
                // Use html2canvas scale for clear text, but Native Print is still recommended for absolute vector
                html2canvas:  { scale: 4, useCORS: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Generate and open in new tab (Often triggers Google Drive viewer on mobile/Chrome)
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
