<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed A4 Standard OMR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ১. পেজ স্ট্যান্ডার্ড ফিক্সড করা */
        :root {
            --p-width: 210mm;
            --p-height: 297mm;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }

        body { 
            background: #2c3e50; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* প্রিভিউ এরিয়া - যা সব ডিভাইসে পেজকে স্ট্যান্ডার্ডে রাখবে */
        .preview-viewport {
            width: 100%;
            padding: 40px 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: auto; /* ছোট স্ক্রিনে ডানে-বামে স্ক্রল হবে কিন্তু ডিজাইন ভাঙবে না */
        }

        /* আসল A4 পেপার - এটিই আপনার মেইন চাবিকাঠি */
        #omr-sheet {
            background: white;
            width: var(--p-width);
            height: var(--p-height);
            min-width: var(--p-width); /* উইডথ ফিক্সড */
            padding: 15mm;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* প্রমিয়াম ওএমআর ডিজাইন */
        .header { border: 4px double #000; text-align: center; padding: 10px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 24pt; letter-spacing: 2px; font-weight: 900; }

        .info-bar { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            border-bottom: 2px solid #000; 
            padding-bottom: 15px; 
            font-weight: bold; 
            font-size: 11pt; 
        }

        /* ৪-কলাম গ্রিড যা কোনো ডিভাইসেই ভাঙবে না */
        .omr-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            column-gap: 15px; 
            flex-grow: 1; 
        }

        .col-box { border: 2px solid #000; padding: 8px 4px; height: fit-content; background: #fff; }

        .q-row { display: flex; align-items: center; height: 32px; border-bottom: 1px solid #eee; }
        .q-num { width: 25px; font-weight: bold; font-size: 10pt; }
        .opt-wrap { display: flex; gap: 8px; justify-content: center; align-items: center; flex-grow: 1; }
        .circle { 
            width: 18px; height: 18px; border: 1.5px solid #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 8pt; font-weight: bold; 
        }

        /* ফুটার টেক্সট */
        .footer-note { margin-top: auto; text-align: center; font-size: 10pt; font-weight: bold; border-top: 2px solid #000; padding-top: 10px; }

        /* বাটন বার */
        .action-bar { 
            position: fixed; bottom: 0; width: 100%; 
            background: white; padding: 15px; 
            display: flex; justify-content: center; gap: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3); z-index: 999;
        }
        .btn { padding: 14px 35px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-print { background: #34495e; color: white; }
        .btn-download { background: #000; color: white; }

        /* প্রিন্ট করার জন্য সেটিংস */
        @media print {
            body { background: white; }
            .action-bar { display: none; }
            .preview-viewport { padding: 0; }
            #omr-sheet { box-shadow: none; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="preview-viewport">
        <div id="omr-sheet">
            <div class="header"><h1>OMR ANSWER SHEET</h1></div>
            
            <div class="info-bar">
                <span>NAME: ______________________</span>
                <span>ROLL: __________</span>
                <span>DATE: _________</span>
            </div>

            <div id="grid-container" class="omr-grid">
                </div>

            <div class="footer-note">
                PLEASE USE BLACK PEN ONLY • DO NOT FOLD THIS SHEET
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-print" onclick="window.print()">Print Now</button>
        <button class="btn btn-download" onclick="downloadPDF()">Download Now</button>
    </div>

    <script>
        const totalQ = parseInt(localStorage.getItem('totalQ')) || 100;
        const grid = document.getElementById('grid-container');
        const rowsPerCol = 25;

        // কলাম জেনারেশন (৪টি কলাম ফিক্সড)
        for (let i = 0; i < 4; i++) {
            const col = document.createElement('div');
            col.className = 'col-box';
            
            for (let j = 1; j <= rowsPerCol; j++) {
                const qNum = (i * rowsPerCol) + j;
                if (qNum > totalQ) break;
                col.innerHTML += `
                    <div class="q-row">
                        <div class="q-num">${qNum}.</div>
                        <div class="opt-wrap">
                            <div class="circle">A</div><div class="circle">B</div>
                            <div class="circle">C</div><div class="circle">D</div>
                        </div>
                    </div>`;
            }
            grid.appendChild(col);
        }

        // পিডিএফ ডাউনলোড লজিক
        function downloadPDF() {
            const element = document.getElementById('omr-sheet');
            const opt = {
                margin: 0,
                filename: 'Premium_OMR_Sheet.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 4, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
