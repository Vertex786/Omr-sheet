<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Premium OMR</title>
    <style>
        /* ১. গ্লোবাল ডিজাইন */
        body { 
            background: #2c3e50; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Helvetica', Arial, sans-serif; 
        }

        /* ২. প্রিভিউ কন্টেইনার - যা দেখবেন তাই ডাউনলোড হবে */
        #omr-sheet {
            background: white;
            width: 210mm;   /* A4 Width */
            height: 297mm;  /* A4 Height */
            padding: 15mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* ৩. মোবাইলে পুরো পেজ দেখার জন্য স্মার্ট স্কেলিং */
        @media screen and (max-width: 800px) {
            #omr-sheet {
                transform: scale(0.45);
                transform-origin: top center;
                margin-top: 20px;
                margin-bottom: -150mm; /* পেজের নিচের গ্যাপ কমানো */
            }
        }
        @media screen and (max-width: 500px) {
            #omr-sheet {
                transform: scale(0.38);
                margin-bottom: -180mm;
            }
        }

        /* ৪. ওএমআর ভেতরের ডিজাইন (প্রিমিয়াম লজিক) */
        .header { border: 3px solid #000; text-align: center; padding: 12px; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 3px; font-weight: 900; }

        .info-bar { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 2.5px solid #000; padding-bottom: 15px; font-weight: bold; font-size: 14px; }

        .omr-grid { display: flex; flex-wrap: wrap; gap: 15px; flex-grow: 1; align-content: flex-start; }

        .col-box { 
            border: 2px solid #000; 
            padding: 10px 5px; 
            width: 44mm; 
            height: fit-content; 
        }

        .q-row { display: flex; align-items: center; height: 32px; border-bottom: 1px solid #f0f0f0; }
        .q-num { width: 28px; font-weight: 900; font-size: 13px; }
        
        .opt-wrap { display: flex; gap: 9px; justify-content: center; align-items: center; flex-grow: 1; }
        
        .circle { 
            width: 20px; height: 20px; border: 1.8px solid #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: bold; 
        }

        /* ৫. ডাউনলোড বাটন */
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; text-align: center; box-shadow: 0 -10px 20px rgba(0,0,0,0.2); z-index: 1000; }
        .btn-print { background: #000; color: #fff; border: none; padding: 15px 50px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* ৬. প্রিন্ট/পিডিএফ সেভ সেটিংস (অত্যন্ত গুরুত্বপূর্ণ) */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            .footer-nav { display: none; } /* বাটন প্রিন্টে আসবে না */
            #omr-sheet { 
                transform: none !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                width: 210mm; 
                height: 297mm; 
            }
        }
    </style>
</head>
<body>

    <div id="omr-sheet">
        <div class="header"><h1>OMR ANSWER SHEET</h1></div>
        
        <div class="info-bar">
            <span>NAME: __________________________</span>
            <span>ROLL: __________</span>
            <span>DATE: _________</span>
        </div>

        <div id="grid-container" class="omr-grid">
            </div>
    </div>

    <div class="footer-nav">
        <button class="btn-print" onclick="window.print()">DOWNLOAD PDF</button>
    </div>

    <script>
        const totalQ = parseInt(localStorage.getItem('totalQ')) || 100;
        const grid = document.getElementById('grid-container');
        const rowsPerCol = 25;
        const neededCols = Math.ceil(totalQ / rowsPerCol);

        for (let i = 0; i < neededCols; i++) {
            const col = document.createElement('div');
            col.className = 'col-box';
            
            for (let j = 1; j <= rowsPerCol; j++) {
                const qNum = (i * rowsPerCol) + j;
                if (qNum > totalQ) break;
                
                col.innerHTML += `
                    <div class="q-row">
                        <div class="q-num">${qNum}.</div>
                        <div class="opt-wrap">
                            <div class="circle">A</div><div class="circle">B</div>
                            <div class="circle">C</div><div class="circle">D</div>
                        </div>
                    </div>`;
            }
            grid.appendChild(col);
        }
    </script>
</body>
</html>
