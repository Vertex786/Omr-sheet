<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Vector OMR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #d81b60; 
            --light-pink: #fce4ec; 
        }
        
        body {
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .setup-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80px;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            font-size: 16px;
        }

        .btn {
            padding: 11px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        /* OMR Design - Optimized for Vector Export */
        #omr-container {
            background: white;
            width: 210mm;
            padding: 15mm;
            box-sizing: border-box;
            display: none; /* Hidden until generated */
        }

        .omr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .column {
            border: 1px solid var(--primary-color);
            border-radius: 2px;
        }

        .header {
            display: flex;
            background: var(--light-pink);
            border-bottom: 1px solid var(--primary-color);
            font-weight: bold;
            font-size: 12px;
        }

        .h-no { width: 30px; text-align: center; padding: 5px 0; border-right: 1px solid var(--primary-color); }
        .h-ans { flex: 1; text-align: center; padding: 5px 0; }

        .row {
            display: flex;
            border-bottom: 0.2px solid var(--light-pink);
            height: 28px;
            align-items: center;
        }

        .q-no {
            width: 30px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            border-right: 1px solid var(--primary-color);
        }

        .bubbles {
            display: flex;
            flex: 1;
            justify-content: space-around;
            padding: 0 4px;
        }

        .circle {
            width: 16px;
            height: 16px;
            border: 1px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: var(--primary-color);
            font-weight: bold;
        }

        @media print {
            .setup-box, .btn-group { display: none !important; }
            #omr-container { display: block !important; }
        }
    </style>
</head>
<body>

    <div class="setup-box" id="setup">
        <h2>Premium OMR Generator</h2>
        <input type="number" id="inputCount" value="100" max="100">
        <button class="btn" onclick="renderPreview()">Preview</button>
    </div>

    <div class="btn-group" id="controls" style="display:none; margin-bottom: 20px;">
        <button class="btn" style="background:#444" onclick="location.reload()">Back</button>
        <button class="btn" onclick="downloadVector()">Download Vector PDF</button>
    </div>

    <div id="omr-container">
        <div style="text-align:center; color:#d81b60; font-size: 22px; font-weight:bold; margin-bottom:15px;">OMR ANSWER SHEET</div>
        <div class="omr-grid" id="mainGrid"></div>
    </div>

    <script>
        function renderPreview() {
            const count = document.getElementById('inputCount').value;
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            let q = 1;
            const totalCols = Math.ceil(count / 25);

            for(let i=0; i<totalCols; i++) {
                let col = `<div class="column"><div class="header"><div class="h-no">No</div><div class="h-ans">Answers</div></div>`;
                for(let j=0; j<25; j++) {
                    if(q > count) break;
                    col += `
                        <div class="row">
                            <div class="q-no">${q}</div>
                            <div class="bubbles">
                                <div class="circle">A</div>
                                <div class="circle">B</div>
                                <div class="circle">C</div>
                                <div class="circle">D</div>
                            </div>
                        </div>`;
                    q++;
                }
                col += `</div>`;
                grid.innerHTML += col;
            }
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            document.getElementById('omr-container').style.display = 'block';
        }

        async function downloadVector() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const element = document.getElementById('omr-container');

            // .html() method with callback ensures vector rendering where possible
            doc.html(element, {
                callback: function (doc) {
                    // Open in new tab (Google Drive viewer style)
                    window.open(doc.output('bloburl'));
                    doc.save('Vector_OMR.pdf');
                },
                x: 0,
                y: 0,
                width: 210, // A4 width in mm
                windowWidth: 794 // A4 width in pixels at 96 DPI
            });
        }
    </script>
</body>
</html>
