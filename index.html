<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro OMR Generator (Vector PDF)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .btn { padding: 12px 25px; background: #000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        input { padding: 10px; width: 100px; border: 2px solid #000; border-radius: 5px; margin: 10px 0; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

    <div class="setup-box">
        <h2 style="margin-top:0">OMR PDF Maker</h2>
        <p>প্রশ্নের সংখ্যা দিন (১-১০০)</p>
        <input type="number" id="qCount" value="100">
        <br>
        <button class="btn" onclick="downloadVectorPDF()">Download & Open in Drive</button>
        <p style="font-size: 12px; color: #666; line-height: 1.5;">
            * এটি সরাসরি হাই-কোয়ালিটি ভেক্টর পিডিএফ তৈরি করবে।<br>
            * জুম করলে ফাটবে না এবং ফাইল সাইজ অত্যন্ত কম হবে।
        </p>
    </div>

    <script>
        function downloadVectorPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const qCount = parseInt(document.getElementById('qCount').value) || 100;

            // ১. কালার সেটআপ (আপনার আগের স্টাইল অনুযায়ী)
            const primaryColor = [0, 0, 0]; // Black
            const pinkColor = [252, 228, 236]; // Light Pink

            // ২. হেডার এবং টেবিল ড্রয়িং (Vector Mode)
            doc.setFillColor(...primaryColor);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("OMR ANSWER SHEET", 105, 15, { align: "center" });

            // ড্যাশবোর্ড বক্স
            doc.setDrawColor(0);
            doc.setLineWidth(0.3);
            
            // ড্যাশবোর্ড সেলগুলো আঁকা
            const drawCell = (x, y, w, h, label, value, isLabel = false) => {
                if(isLabel) {
                    doc.setFillColor(...pinkColor);
                    doc.rect(x, y, w, h, 'F');
                }
                doc.rect(x, y, w, h);
                doc.setFontSize(9);
                doc.setTextColor(isLabel ? 0 : 50);
                doc.text(label, x + 2, y + 6);
                if(value) {
                    doc.setFontSize(10);
                    doc.text(value, x + w - 2, y + 6, { align: 'right' });
                }
            };

            // ড্যাশবোর্ড গ্রিড (৩টি সারি)
            let dY = 22;
            drawCell(10, dY, 40, 10, "EXAM NAME", "", true);
            drawCell(50, dY, 60, 10, "................................", "");
            drawCell(110, dY, 40, 10, "TOTAL Q.", "", true);
            drawCell(150, dY, 50, 10, qCount.toString(), "");

            dY += 10;
            drawCell(10, dY, 40, 10, "CANDIDATE NAME", "", true);
            drawCell(50, dY, 60, 10, "................................", "");
            drawCell(110, dY, 40, 10, "SKIP", "", true);
            drawCell(150, dY, 50, 10, "..................", "");

            dY += 10;
            drawCell(10, dY, 40, 10, "DATE", "", true);
            drawCell(50, dY, 60, 10, ".../.../202...", "");
            drawCell(110, dY, 40, 10, "OBTAIN MARKS", "", true);
            drawCell(150, dY, 50, 10, "..................", "");

            // ৩. ওএমআর কলাম সেটআপ (১-২৫ কলাম ভিত্তিক)
            const startY = 60;
            const colWidth = 46;
            const rowHeight = 8.5;

            doc.setTextColor(0);
            for (let i = 0; i < Math.min(qCount, 100); i++) {
                const colIndex = Math.floor(i / 25); // প্রতি কলামে ২৫টি
                const rowIndex = i % 25;

                const x = 10 + (colIndex * (colWidth + 2));
                const y = startY + (rowIndex * rowHeight);

                // রো বর্ডার ও নম্বর
                doc.setDrawColor(0);
                doc.setFillColor(...pinkColor);
                doc.rect(x, y, 8, rowHeight, 'F'); // নম্বর কলামের ব্যাকগ্রাউন্ড
                doc.rect(x, y, colWidth, rowHeight); // পুরো রো বর্ডার
                
                doc.setFontSize(10);
                doc.setFont("helvetica", "bold");
                doc.text((i + 1).toString(), x + 4, y + 5.5, { align: "center" });

                // অপশন বাবল (বিত্ত আঁকা)
                const options = ['A', 'B', 'C', 'D'];
                options.forEach((opt, optIdx) => {
                    const bx = x + 15 + (optIdx * 8.5);
                    const by = y + 4.2;
                    
                    doc.setLineWidth(0.15);
                    doc.circle(bx, by, 3, 'S'); // বৃত্ত
                    doc.setFontSize(8);
                    doc.setFont("helvetica", "normal");
                    doc.text(opt, bx, by + 0.8, { align: "center" });
                });
            }

            // ৪. সরাসরি ডাউনলোড
            // এটি ব্রাউজারের মাধ্যমে ফাইল ডাউনলোড করবে। 
            // মোবাইলে এটি সরাসরি Google Drive PDF Viewer এ খোলার অপশন দেয়।
            doc.save("OMR_Official_Sheet.pdf");
        }
    </script>
</body>
</html>
