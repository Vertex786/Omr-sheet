<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Colorful OMR Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-light: #f4f7f9;
            --border-color: #d1d8e0;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: #606c76; }
        
        .controls { 
            position: sticky; top: 0; z-index: 100;
            text-align: center; padding: 15px; background: #ffffff; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
        }
        
        .btn-dl { 
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white; padding: 14px 30px; border: none; border-radius: 50px;
            font-size: 16px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
        }

        /* A4 Page Styling */
        #print-area { 
            background: white; width: 210mm; min-height: 297mm; 
            margin: 20px auto; padding: 10mm; box-sizing: border-box;
        }

        .header { 
            text-align: center; margin-bottom: 20px; padding: 15px;
            border: 2px solid var(--primary-color); border-radius: 10px;
            background: #f0f7ff;
        }
        
        .header h1 { margin: 0; color: var(--primary-color); font-size: 28px; text-transform: uppercase; }

        .info-grid { 
            display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;
            margin-bottom: 20px; font-size: 13px; 
        }
        .info-box { border-bottom: 1px dashed #888; padding: 5px 0; }

        /* ৪টি আলাদা কলাম বক্স */
        .omr-container { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
        }

        .column-box { 
            border: 1px solid var(--border-color); 
            border-radius: 8px; padding: 10px;
            background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .row { 
            display: flex; align-items: center; height: 30px; margin-bottom: 5px;
            border-bottom: 1px solid #f9f9f9;
        }

        .q-no { width: 28px; font-size: 12px; font-weight: bold; color: #555; }
        
        .options { display: flex; gap: 6px; }

        /* কালারফুল বৃত্ত */
        .circle { 
            width: 20px; height: 20px; border: 1.5px solid var(--primary-color); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: bold; color: var(--primary-color);
            background: #fdfdfd;
        }

        /* প্রতিটি অপশনের জন্য আলাদা হালকা শেড (অপশনাল) */
        .circle:nth-child(1) { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
        .circle:nth-child(2) { border-color: #2ecc71; color: #2ecc71; background: #f4fff9; }
        .circle:nth-child(3) { border-color: #f1c40f; color: #f1c40f; background: #fffdf0; }
        .circle:nth-child(4) { border-color: #9b59b6; color: #9b59b6; background: #faf5ff; }

        @media print {
            .controls { display: none; }
            body { background: white; }
            #print-area { margin: 0; }
            .column-box { border: 1px solid #ddd !important; } /* প্রিন্টে বর্ডার স্পষ্ট করার জন্য */
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn-dl" onclick="downloadPDF()">High Quality PDF ডাউনলোড করুন</button>
</div>

<div id="print-area">
    <div class="header">
        <h1>OMR Answer Sheet</h1>
    </div>

    <div class="info-grid">
        <div class="info-box">Name: __________________________</div>
        <div class="info-box">Roll: __________</div>
        <div class="info-box">Date: _________</div>
    </div>

    <div id="main-content" class="omr-container">
        </div>
</div>

<script>
    const totalQ = parseInt(localStorage.getItem('totalQ')) || 100;
    const container = document.getElementById('main-content');
    const rowsPerColumn = 25;
    const totalCols = Math.ceil(totalQ / rowsPerColumn);

    for (let i = 0; i < totalCols; i++) {
        // প্রতিটি কলামের জন্য আলাদা বক্স
        const colBox = document.createElement('div');
        colBox.className = 'column-box';

        for (let j = 1; j <= rowsPerColumn; j++) {
            const qNum = (i * rowsPerColumn) + j;
            if (qNum > totalQ) break;

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <div class="q-no">${qNum}</div>
                <div class="options">
                    <div class="circle">A</div>
                    <div class="circle">B</div>
                    <div class="circle">C</div>
                    <div class="circle">D</div>
                </div>
            `;
            colBox.appendChild(row);
        }
        container.appendChild(colBox);
    }

    function downloadPDF() {
        const element = document.getElementById('print-area');
        const opt = {
            margin: 0,
            filename: 'Colorful_OMR_Sheet.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 4, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        const btn = document.querySelector('.btn-dl');
        btn.innerText = "PDF তৈরি হচ্ছে...";
        
        html2pdf().set(opt).from(element).save().then(() => {
            btn.innerText = "High Quality PDF ডাউনলোড করুন";
        });
    }
</script>

</body>
</html>
