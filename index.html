<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Own OMR Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .btn { padding: 12px 25px; background: #000000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        input { padding: 10px; border: 2px solid #000; border-radius: 5px; margin: 10px 0; font-size: 16px; text-align: center; width: 100px; }
        .input-group { margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="setup-box">
        <h2 style="margin-top:0">Make Your OMR Sheet</h2>
        
        <div class="input-group">
            <p style="font-weight: 600; margin-bottom: 5px;">ENTER YOUR QUESTION NUMBER <br><span style="color:rgba(120,120,120,1) ;font-weight:400;">(Max 100 Question)</span></p>
            <input type="number" id="qCount" placeholder="100" value="100" min="1" max="100">
        </div>

        <div class="input-group">
            <p style="font-weight: 600; margin-bottom: 5px;">NUMBER OF OPTIONS <br><span style="color:rgba(120,120,120,1) ;font-weight:400;">(Type 3, 4, or 5)</span></p>
            <input type="number" id="optCount" placeholder="4" value="4" min="3" max="5">
        </div>
        
        <br>
        <button class="btn" onclick="downloadVectorPDF()">Download & Open in Drive</button>
       
    </div>

    <script>
        function downloadVectorPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // ইনপুট ভ্যালিডেশন
            const qCount = parseInt(document.getElementById('qCount').value) || 100;
            let optCount = parseInt(document.getElementById('optCount').value) || 4;
            
            // ৩, ৪ বা ৫ এর বাইরে দিলে ডিফল্ট ৪ সেট করবে
            if (optCount < 3) optCount = 3;
            if (optCount > 5) optCount = 5;

            // ১. কালার সেটআপ
            const primaryColor = [0, 0, 0]; // Black
            const pinkColor = [252, 228, 236]; // Light Pink

            // ২. হেডার এবং টেবিল ড্রয়িং (Vector Mode)
            doc.setFillColor(...primaryColor);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("OMR ANSWER SHEET", 105, 15, { align: "center" });

            // ড্যাশবোর্ড বক্স
            doc.setDrawColor(0);
            doc.setLineWidth(0.3);
            
            // ড্যাশবোর্ড সেলগুলো আঁকা
            const drawCell = (x, y, w, h, label, value, isLabel = false) => {
                if(isLabel) {
                    doc.setFillColor(...pinkColor);
                    doc.rect(x, y, w, h, 'F');
                }
                doc.rect(x, y, w, h);
                doc.setFontSize(9);
                doc.setTextColor(isLabel ? 0 : 50);
                doc.text(label, x + 2, y + 6);
                if(value) {
                    doc.setFontSize(10);
                    doc.text(value, x + w - 2, y + 6, { align: 'right' });
                }
            };

            // ড্যাশবোর্ড গ্রিড (৩টি সারি)
            let dY = 22;
            drawCell(10, dY, 40, 10, "EXAM NAME", "", true);
            drawCell(50, dY, 60, 10, "", "");
            drawCell(110, dY, 40, 10, "TOTAL Q.", "", true);
            drawCell(150, dY, 50, 10, "", "");

            dY += 10;
            drawCell(10, dY, 40, 10, "CANDIDATE NAME", "", true);
            drawCell(50, dY, 60, 10, "", "");
            drawCell(110, dY, 40, 10, "WRONG & SKIP", "", true);
            drawCell(150, dY, 50, 10, "                         &", "");

            dY += 10;
            drawCell(10, dY, 40, 10, "DATE", "", true);
            drawCell(50, dY, 60, 10, "", "");
            drawCell(110, dY, 40, 10, "OBTAIN MARKS", "", true);
            drawCell(150, dY, 50, 10, "", "");

            // ৩. ওএমআর কলাম সেটআপ (১-২৫ কলাম ভিত্তিক)
            const startY = 60;
            const colWidth = 46;
            const rowHeight = 8.5;

            // অপশনের স্পেসিং নির্ধারণ (বক্সের ভেতর পারফেক্টলি ফিট করার জন্য)
            let startOptX, optGap;
            
            if (optCount === 3) {
                startOptX = 17;   // ৩টি অপশনের জন্য সেন্টারিং
                optGap = 10;
            } else if (optCount === 4) {
                startOptX = 14.5; // ৪টি অপশনের জন্য সেন্টারিং
                optGap = 8.5;
            } else if (optCount === 5) {
                startOptX = 13;   // ৫টি অপশনের জন্য পারফেক্ট সেন্টারিং (বর্ডার থেকে দূরত্ব বজায় রাখতে)
                optGap = 7;
            }

            const allOptions = ['A', 'B', 'C', 'D', 'E'];
            const currentOptions = allOptions.slice(0, optCount);

            doc.setTextColor(0);
            for (let i = 0; i < Math.min(qCount, 100); i++) {
                const colIndex = Math.floor(i / 25); // প্রতি কলামে ২৫টি
                const rowIndex = i % 25;

                const x = 10 + (colIndex * (colWidth + 2));
                const y = startY + (rowIndex * rowHeight);

                // রো বর্ডার ও নম্বর
                doc.setDrawColor(0);
                doc.setFillColor(...pinkColor);
                doc.rect(x, y, 8, rowHeight, 'F'); // নম্বর কলামের ব্যাকগ্রাউন্ড
                doc.setLineWidth(0.1);
                doc.rect(x, y, colWidth, rowHeight); // পুরো রো বর্ডার
                
                doc.setFontSize(10);
                doc.setFont("helvetica", "bold");
                doc.text((i + 1).toString(), x + 4, y + 5.5, { align: "center" });

                // অপশন বাবল (বিত্ত আঁকা)
                currentOptions.forEach((opt, optIdx) => {
                    const bx = x + startOptX + (optIdx * optGap);
                    const by = y + 4.2;
                    
                    doc.setLineWidth(0.25);
                    doc.circle(bx, by, 3, 'S'); // বৃত্ত
                    doc.setFontSize(8);
                    doc.setFont("helvetica", "normal");
                    doc.text(opt, bx, by + 0.8, { align: "center" });
                });
            }

            // ৪. সরাসরি ডাউনলোড
            doc.save("OMR Sheet.pdf");
        }
    </script>
</body>
</html>
