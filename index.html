<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Bengali OMR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: black; 
            --light-pink: #fce4ec; 
            --border-color: black;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .setup-box {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
            width: 100%; max-width: 400px; margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px; background: var(--primary-color);
            color: white; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        
        .btn:disabled {
            background: #888;
            cursor: not-allowed;
        }

        /* OMR Paper Style */
        #omr-paper {
            display: none; background: white; width: 210mm;
            min-height: 297mm; padding: 10mm 15mm; box-sizing: border-box;
        }

        .omr-header-text {
            text-align: center; color: var(--primary-color);
            font-size: 24px; font-weight: bold; margin-bottom: 20px;
        }

        /* Dashboard Style */
        .dashboard {
            width: 100%; border-collapse: collapse; margin-bottom: 10px;
        }
        .dashboard td {
            border: 1.5px solid var(--border-color); padding: 8px 12px;
            font-size: 14px; color: #333;
        }
        .label { background: var(--light-pink); font-weight: bold; width: 22%; }

        /* OMR Columns */
        .omr-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }
        .omr-col { border: 2px solid var(--border-color); border-radius: 2px; }
        
        .col-head {
            display: flex; background: var(--light-pink);
            border-bottom: 2px solid var(--border-color); font-weight: bold;
        }
        .h-no { width: 35px; text-align: center; padding: 5px 0; border-right: 2px solid var(--border-color); }
        .h-ans { flex: 1; text-align: center; padding: 5px 0; }

        .row {
            display: flex; border-bottom: 1px solid #fce4ec;
            height: 32px; align-items: center;
        }
        .q-no {
            width: 35px; text-align: center; font-weight: bold;
            border-right: 2px solid var(--border-color); font-size: 15px;
        }
        .options {
            display: flex; flex: 1; justify-content: space-around; padding: 0 5px;
        }
        .bubble {
            width: 20px; height: 20px; border: 1.2px solid var(--primary-color);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 12px; color: var(--primary-color);
            font-weight: 800;
        }

        @media print {
            .setup-box, .actions { display: none !important; }
            #omr-paper { display: block !important; }
        }
    </style>
</head>
<body>

    <div class="setup-box" id="setup">
        <h2 style="color:var(--primary-color)">Bangla OMR Maker</h2>
        <p>ENTER QUESTION NUMBER</p>
        <input type="number" id="qCount" value="100" style="padding:10px; width:100px; border:2px solid var(--primary-color); border-radius:5px;">
        <br>
        <button class="btn" onclick="generateOMR()">Preview OMR</button>
    </div>

    <div class="actions" id="controls" style="display:none; margin-bottom: 20px;">
        <button class="btn" style="background:#555" onclick="location.reload()">Back</button>
        <button class="btn" id="downloadBtn" onclick="downloadVectorPDF()">Open in Google Drive / PDF Viewer</button>
    </div>

    <div id="omr-paper">
        <div class="omr-header-text">OMR SHEET</div>
        
        <table class="dashboard">
            <tr>
                <td class="label">EXAM NAME</td>
                <td class="value">................................</td>
                <td class="label">CANDIDATE NAME</td>
                <td class="value">................................</td>
            </tr>
            <tr>
                <td class="label">TOTAL QUESTION</td>
                <td class="value" id="disp-count">0</td>
                <td class="label">DATE</td>
                <td class="value">....... / ....... / 20...</td>
            </tr>
            <tr>
                <td class="label">CORRECT ANSWER</td>
                <td class="value">__________</td>
                <td class="label">WRONG ANSWER</td>
                <td class="value">__________</td>
            </tr>
            <tr>
                <td class="label">SKIP</td>
                <td class="value">__________</td>
                <td class="label">TOTAL NUMBER</td>
                <td class="value">__________</td>
            </tr>
        </table>

        <div class="omr-grid" id="grid"></div>
    </div>

    <script>
        const bnNums = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
        function toBn(n) { return n.toString().split('').map(d => bnNums[d]).join(''); }

        function generateOMR() {
            const count = parseInt(document.getElementById('qCount').value) || 100;
            document.getElementById('disp-count').innerText = toBn(count);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            let current = 1;
            const limit = Math.min(count, 100);
            const cols = Math.ceil(limit / 25);

            for(let i=0; i<cols; i++) {
                let col = `<div class="omr-col"><div class="col-head"><div class="h-no">ক্রম</div><div class="h-ans">উত্তর</div></div>`;
                for(let j=0; j<25; j++) {
                    if(current > limit) break;
                    col += `<div class="row">
                        <div class="q-no">${toBn(current)}</div>
                        <div class="options">
                            <div class="bubble">A</div><div class="bubble">B</div><div class="bubble">C</div><div class="bubble">D</div>
                        </div>
                    </div>`;
                    current++;
                }
                col += `</div>`;
                grid.innerHTML += col;
            }
            document.getElementById('setup').style.display='none';
            document.getElementById('controls').style.display='block';
            document.getElementById('omr-paper').style.display='block';
        }

        function downloadVectorPDF() {
            const btn = document.getElementById('downloadBtn');
            btn.innerText = "Processing High-Quality PDF...";
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const element = document.getElementById('omr-paper');

            doc.html(element, {
                callback: function (doc) {
                    // এটি সরাসরি ডাউনলোড না করে একটি Blob URL তৈরি করবে
                    // যার ফলে মোবাইলে এটি Google Drive PDF Viewer-এ ওপেন হবে।
                    const pdfBlob = doc.output('blob');
                    const pdfUrl = URL.createObjectURL(pdfBlob);
                    
                    window.open(pdfUrl, '_blank');
                    
                    btn.innerText = "Open in Google Drive / PDF Viewer";
                    btn.disabled = false;
                },
                x: 0, 
                y: 0,
                width: 210,
                windowWidth: 794,
                html2canvas: { 
                    scale: 4, // এই scale: 4 এর কারণেই জুম করলে পিডিএফ একদমই ফাটবে না (High Resolution)
                    useCORS: true,
                    logging: false
                }
            });
        }
    </script>
</body>
</html>
