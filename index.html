<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium OMR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #d81b60; 
            --light-pink: #fce4ec; 
            --border-color: #d81b60;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Input Section */
        .input-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }

        input[type="number"] {
            padding: 12px;
            width: 100px;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            font-size: 18px;
            outline: none;
        }

        .btn {
            padding: 12px 25px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Controls */
        .controls { display: none; gap: 15px; margin-bottom: 20px; }

        /* OMR Sheet Design (Exactly what you liked) */
        #omr-sheet {
            background: white;
            padding: 15mm;
            width: 210mm; /* A4 Width */
            min-height: 297mm;
            box-sizing: border-box;
            display: none;
        }

        .omr-title {
            text-align: center;
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .omr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .column {
            border: 1.5px solid var(--border-color);
            border-radius: 5px;
            overflow: hidden;
        }

        .header {
            display: flex;
            background: var(--light-pink);
            border-bottom: 1.5px solid var(--border-color);
            font-weight: bold;
            font-size: 13px;
        }

        .h-no { width: 35px; text-align: center; padding: 8px 0; border-right: 1.5px solid var(--border-color); }
        .h-ans { flex: 1; text-align: center; padding: 8px 0; }

        .row {
            display: flex;
            border-bottom: 0.5px solid var(--light-pink);
            align-items: center;
            height: 32px;
        }

        .row:nth-child(even) { background: #fff9fb; }
        .row:last-child { border-bottom: none; }

        .q-no {
            width: 35px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border-right: 1.5px solid var(--border-color);
            color: #333;
        }

        .bubbles {
            display: flex;
            flex: 1;
            justify-content: space-around;
            padding: 0 5px;
        }

        .circle {
            width: 20px;
            height: 20px;
            border: 1.2px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: var(--primary-color);
        }

        @media print {
            .input-box, .controls { display: none !important; }
            #omr-sheet { display: block !important; box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="input-box" id="setup">
        <h2 style="color: var(--primary-color);">OMR Generator</h2>
        <input type="number" id="totalQ" value="100" min="1" max="100">
        <button class="btn" onclick="buildOMR()">Generate Preview</button>
    </div>

    <div class="controls" id="controls">
        <button class="btn" style="background:#555" onclick="location.reload()">Reset</button>
        <button class="btn" onclick="window.print()">Print</button>
        <button class="btn" onclick="savePDF()">Download PDF</button>
    </div>

    <div id="omr-sheet">
        <div class="omr-title">OMR ANSWER SHEET</div>
        <div class="omr-grid" id="gridCont"></div>
    </div>

    <script>
        function buildOMR() {
            const num = document.getElementById('totalQ').value;
            const container = document.getElementById('gridCont');
            container.innerHTML = '';
            
            let current = 1;
            const cols = Math.ceil(num / 25);

            for(let i=0; i<cols; i++) {
                let colHtml = `<div class="column"><div class="header"><div class="h-no">No.</div><div class="h-ans">Answers</div></div>`;
                for(let j=0; j<25; j++) {
                    if(current > num) break;
                    colHtml += `
                        <div class="row">
                            <div class="q-no">${current}</div>
                            <div class="bubbles">
                                <div class="circle">A</div>
                                <div class="circle">B</div>
                                <div class="circle">C</div>
                                <div class="circle">D</div>
                            </div>
                        </div>`;
                    current++;
                }
                colHtml += `</div>`;
                container.innerHTML += colHtml;
            }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('omr-sheet').style.display = 'block';
        }

        async function savePDF() {
            const { jsPDF } = window.jspdf;
            const sheet = document.getElementById('omr-sheet');
            
            // High quality capture
            const canvas = await html2canvas(sheet, {
                scale: 3, // Increases resolution so it won't pixelate on zoom
                useCORS: true,
                logging: false
            });

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            
            pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
            
            // This will open in Google Drive PDF viewer on most mobile browsers
            window.open(pdf.output('bloburl'), '_blank');
            pdf.save("OMR_Sheet_Premium.pdf");
        }
    </script>
</body>
</html>
